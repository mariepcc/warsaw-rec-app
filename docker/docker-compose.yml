name: timescaledb
services:
  timescaledb:
    image: timescale/timescaledb-ha:pg17
    container_name: timescaledb
    user: postgres
    environment:
      - POSTGRES_DB=warsaw_places
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  timescaledb_data: